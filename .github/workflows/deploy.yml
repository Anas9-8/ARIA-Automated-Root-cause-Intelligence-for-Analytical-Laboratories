name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/aria

            git pull origin main

            docker-compose down --remove-orphans
            docker-compose up --build -d

            echo "Waiting for app to become ready..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "App is up (attempt ${i})"
                break
              fi
              if [ "${i}" -eq 12 ]; then
                echo "App did not respond after 60 seconds"
                docker-compose logs --tail 30
                exit 1
              fi
              echo "Attempt ${i}: not ready yet, waiting 5s..."
              sleep 5
            done

            echo "Deploy complete. Verifying dashboard..."
            curl -sf http://localhost:8000/causal > /dev/null && echo "Dashboard OK"
            curl -sf http://localhost:8000/docs   > /dev/null && echo "API docs OK"
